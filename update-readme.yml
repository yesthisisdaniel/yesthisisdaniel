name: Update README stats

on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update lines-of-code section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: yesthisisdaniel
        run: node scripts/update_loc.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README stats [skip ci]"
          git push
